name: Validate marketplace

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install --global @anthropic-ai/claude-code

      - name: Validate marketplace manifest
        run: claude plugin validate .

      - name: Validate each plugin manifest
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for p in plugins/*/; do
            found=1
            echo "::group::$p"
            claude plugin validate "$p"
            echo "::endgroup::"
          done
          if [ "$found" -eq 0 ]; then
            echo "No plugins found under plugins/ — skipping per-plugin validation."
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run MCP server test suites
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for proj in plugins/*/servers/*/pyproject.toml; do
            found=1
            dir=$(dirname "$proj")
            if [ -d "$dir/tests" ]; then
              echo "::group::$dir"
              (cd "$dir" && uv sync --group dev --quiet && uv run --quiet pytest -q)
              echo "::endgroup::"
            else
              echo "Skipping $dir — no tests/ directory."
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No in-tree server projects found."
          fi
